<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria Real Estate Predictor</title>
       <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000000; /* Deep Black Background */
            display: flex; 
            justify-content: center; 
            padding: 50px; 
            color: #D4AF37; /* Primary Gold Text */
        }
        .container { 
            background: #1a1a1a; /* Darker grey/black for contrast */
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #D4AF37; /* Gold Border */
            box-shadow: 0px 4px 30px rgba(212, 175, 55, 0.2); 
            width: 100%; 
            max-width: 500px; 
        }
        h2 { color: #D4AF37; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #f1f1f1; }
        
        input, select { 
            width: 100%; 
            padding: 10px; 
            background-color: #333; 
            border: 1px solid #444; 
            border-radius: 6px; 
            box-sizing: border-box; 
            color: white; 
        }
        input:focus { border-color: #D4AF37; outline: none; }
        
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #D4AF37; /* Gold Button */
            color: black; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 10px; 
            text-transform: uppercase;
        }
        button:hover { background-color: #B8860B; /* Darker Gold on Hover */ }
        
        .result { 
            margin-top: 25px; 
            padding: 15px; 
            background-color: #222; 
            border: 1px solid #D4AF37; 
            text-align: center; 
        }
    </style>

</head>
<body>

<div class="container">
    <h2>Nigeria Price Predictor</h2>
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Town</label>
            <input type="text" name="town" placeholder="e.g. Maitama" required>
        </div>

        <div class="form-group">
            <label>State</label>
            <input type="text" name="state" placeholder="Abuja" required>
        </div>

        <div class="form-group">
            <label>Property Type</label>
            <select name="title">
                <option value="Detached Duplex">Detached Duplex</option>
                <option value="Terraced Duplex">Terraced Duplex</option>
                <option value="Flat">Flat</option>
                <option value="Bungalow">Bungalow</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group">
                <label>Bedrooms</label>
                <input type="number" name="bedrooms" value="3" required>
            </div>
            <div class="form-group">
                <label>Bathrooms</label>
                <input type="number" name="bathrooms" value="3" required>
            </div>
        </div>

        <div class="form-group">
            <label>Parking Spaces</label>
            <input type="number" name="parking_space" value="2" required>
        </div>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h3>Estimated Value:</h3>
        <h2 style="color: #27ae60;">₦{{ prediction|floatformat:2 }}</h2>
    </div>
    {% endif %}
</div>

</body>
</html>
